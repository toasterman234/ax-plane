id: demo_ax_agent
name: Demo Ax Agent
description: AxPlane demo agent with read-only host tools, persistent memory, and approval-gated write tools.
runtime: ax
mode: rlm
signature: "taskText:string \"the user task\" -> answer:string, nextActions:string[]"
contextFields:
  - taskText
contextPolicy:
  preset: checkpointed
  budget: balanced
tools:
  - fake.projectLookup
  - fake.riskyAction
  - repo.listFiles
  - repo.readFile
  - repo.search
  - repo.writeFile
  - github.searchIssues
  - github.readIssue
  - github.readFile
  - github.createIssue
  - github.createBranch
  - github.createPR
  - docs.search
  - shell.run
  - memory.save
  - memory.search
  - memory.list
policies:
  - default_allow
  - write_tool_requires_approval
  - block_secret_exfiltration
models:
  primary:
    provider: openai
    model: gpt-4o-mini
routing:
  keywords:
    - approval
    - plan
    - demo
    - fake
    - risky
  priority: 0
  isDefault: true
memory:
  kernelInject: true
  injectLimit: 5
