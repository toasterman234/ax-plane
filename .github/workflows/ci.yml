name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axplane
          POSTGRES_PASSWORD: axplane
          POSTGRES_DB: axplane
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U axplane"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://axplane:axplane@localhost:5433/axplane
      AXPLANE_EXECUTION_MODE: mock
      API_PORT: 8797
      WEB_PORT: 3010
      NEXT_PUBLIC_API_URL: http://localhost:8797

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate
        run: pnpm db:migrate

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
